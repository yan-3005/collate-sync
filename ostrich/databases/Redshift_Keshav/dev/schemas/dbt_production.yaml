    description: "Customer dimension table serving as the primary source of truth\
      \ for customer profiles and behavioral metrics. This table consolidates customer\
      \ demographic information with aggregated order history data, providing a 360-degree\
      \ view of customer engagement. Sourced from transactional order systems and\
      \ transformed through dbt to calculate lifetime value metrics and ordering patterns.\
      \ Commonly used for customer segmentation analysis, retention reporting, and\
      \ marketing campaign targeting. Each record represents a unique customer with\
      \ their complete order history summarized into key performance indicators."
